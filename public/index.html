<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1a1a2e" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="血壓助手" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <title>血壓紀錄助手</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Header ── */
    header {
      background: #1a1a2e;
      color: #fff;
      text-align: center;
      padding: 16px 12px;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 2px;
      flex-shrink: 0;
    }

    /* ── Transcript area ── */
    #transcript-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bubble {
      background: #fff;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 1.4rem;
      line-height: 1.6;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      max-width: 92%;
      word-break: break-word;
    }

    .bubble.btn1 { border-left: 5px solid #27ae60; }
    .bubble.btn2 { border-left: 5px solid #e74c3c; align-self: flex-end; }
    .bubble.error {
      background: #fff0f0;
      border-left-color: #c0392b;
      color: #c0392b;
      white-space: pre-line;
    }
    .upload-tag {
      display: inline-block;
      margin-top: 6px;
      font-size: 1.2rem;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .upload-tag.ok   { background: #eafaf1; color: #27ae60; }
    .upload-tag.fail { background: #fff0f0; color: #c0392b; }

    /* ── Query result bubble ── */
    .bubble.query {
      border-left: 5px solid #2980b9;
      max-width: 100%;
      font-size: 0.92rem;
      padding: 12px 14px;
    }
    .bubble.query .query-title {
      font-weight: 700;
      font-size: 1rem;
      color: #2980b9;
      margin-bottom: 8px;
    }
    .bubble.query table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
    }
    .bubble.query th {
      text-align: left;
      color: #888;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 2px 6px 4px 0;
      border-bottom: 1px solid #e0e0e0;
    }
    .bubble.query td {
      padding: 3px 6px 3px 0;
      color: #333;
      border-bottom: 1px solid #f0f0f0;
    }
    .bubble.query .no-records {
      color: #aaa;
      font-style: italic;
    }

    #status {
      text-align: center;
      font-size: 1.2rem;
      color: #888;
      padding: 6px 0;
      min-height: 28px;
      flex-shrink: 0;
    }

    #status.recording {
      color: #e74c3c;
      font-weight: 600;
      animation: blink 1s step-start infinite;
    }

    @keyframes blink {
      50% { opacity: 0.3; }
    }

    /* ── Bottom buttons ── */
    .btn-row {
      display: flex;
      gap: 4%;
      padding: 12px 3%;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: #fff;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
      flex-shrink: 0;
    }

    .record-btn {
      flex: 0 0 40%;
      height: clamp(80px, 18vw, 120px);
      border: none;
      border-radius: 18px;
      font-size: clamp(2.5rem, 12vw, 5rem);
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      transition: transform 0.08s, filter 0.08s;
      box-shadow: 0 4px 14px rgba(0,0,0,0.2);
    }

    .record-btn:active,
    .record-btn.pressing {
      transform: scale(0.95);
      filter: brightness(0.85);
    }

    #btn1 { background: #27ae60; margin-left: auto; }
    #btn2 { background: #e74c3c; margin-right: auto; }
  </style>
</head>
<body>

  <header>血壓紀錄助手</header>

  <div id="transcript-area"></div>

  <div id="status">按住按鈕開始錄音</div>

  <div class="btn-row">
    <button id="btn1" class="record-btn">1</button>
    <button id="btn2" class="record-btn">2</button>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const transcriptArea = document.getElementById('transcript-area');

    let mediaRecorder = null;
    let audioChunks = [];
    let activeBtn = null;
    let stream = null;

    async function getStream() {
      // Re-acquire if stream is missing or any track has ended (e.g. after screen lock / iOS interruption)
      const isLive = stream && stream.getTracks().every(t => t.readyState === 'live');
      if (!isLive) {
        if (stream) stream.getTracks().forEach(t => t.stop());
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      }
      return stream;
    }

    async function startRecording(btn) {
      if (activeBtn) return;
      activeBtn = btn;
      audioChunks = [];

      try {
        const s = await getStream();
        const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
          ? 'audio/webm;codecs=opus'
          : MediaRecorder.isTypeSupported('audio/webm')
          ? 'audio/webm'
          : 'audio/ogg';

        mediaRecorder = new MediaRecorder(s, { mimeType });
        mediaRecorder.ondataavailable = e => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };
        mediaRecorder.start(100);

        btn.classList.add('pressing');
        statusEl.textContent = '● 錄音中…';
        statusEl.className = 'recording';
      } catch (err) {
        statusEl.textContent = '麥克風存取失敗：' + err.message;
        statusEl.className = '';
        activeBtn = null;
      }
    }

    async function stopRecording() {
      if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
      const btn = activeBtn;
      activeBtn = null;

      return new Promise(resolve => {
        mediaRecorder.onstop = async () => {
          btn.classList.remove('pressing');
          statusEl.textContent = '辨識中…';
          statusEl.className = '';

          const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
          audioChunks = [];

          const formData = new FormData();
          formData.append('audio', blob, 'recording.webm');
          formData.append('btnId', btn.id);

          try {
            const resp = await fetch('/transcribe', { method: 'POST', body: formData });
            const data = await resp.json();

            if (data.type === 'query') {
              if (data.error) {
                addErrorBubble(data.error, btn.id);
                statusEl.textContent = data.error;
              } else {
                addQueryBubble(data.label, data.records, btn.id);
                statusEl.textContent = `查詢完成：${data.label}，共 ${data.records.length} 筆`;
              }
            } else {
              // BP recording result
              if (data.text) {
                addBubble(data.text, btn.id, data.error, data.uploaded);
                statusEl.textContent = data.error ? data.error : '按住按鈕開始錄音';
              } else {
                statusEl.textContent = '錯誤：' + (data.error || '未知錯誤');
              }
            }
          } catch (e) {
            statusEl.textContent = '傳送失敗：' + e.message;
          }
          resolve();
        };
        mediaRecorder.stop();
      });
    }

    function addBubble(text, btnId, error, uploaded) {
      const div = document.createElement('div');
      div.className = `bubble ${btnId}${error ? ' error' : ''}`;

      const main = document.createElement('div');
      main.textContent = error ? `${text}\n${error}` : text;
      div.appendChild(main);

      if (!error) {
        const tag = document.createElement('div');
        tag.className = `upload-tag ${uploaded ? 'ok' : 'fail'}`;
        tag.textContent = uploaded ? '已上傳' : '上傳失敗';
        div.appendChild(tag);
      }

      transcriptArea.appendChild(div);
      div.scrollIntoView({ behavior: 'smooth' });
    }

    function addErrorBubble(msg, btnId) {
      const div = document.createElement('div');
      div.className = `bubble ${btnId} error`;
      div.textContent = msg;
      transcriptArea.appendChild(div);
      div.scrollIntoView({ behavior: 'smooth' });
    }

    function addQueryBubble(label, records, btnId) {
      const div = document.createElement('div');
      div.className = `bubble ${btnId} query`;

      const title = document.createElement('div');
      title.className = 'query-title';
      title.textContent = `${label}（${records.length} 筆）`;
      div.appendChild(title);

      if (records.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'no-records';
        empty.textContent = '此期間無記錄';
        div.appendChild(empty);
      } else {
        const table = document.createElement('table');
        table.innerHTML = `<tr>
          <th>日期時間</th>
          <th>收縮壓</th>
          <th>舒張壓</th>
          <th>心率</th>
        </tr>`;
        records.forEach(r => {
          const tr = document.createElement('tr');
          // Show date as MM/DD HH:mm
          const dt = r.datetime.replace(/^\d{4}-/, '').replace('-', '/');
          tr.innerHTML = `<td>${dt}</td><td>${r.sys}</td><td>${r.dia}</td><td>${r.hr}</td>`;
          table.appendChild(tr);
        });
        div.appendChild(table);
      }

      transcriptArea.appendChild(div);
      div.scrollIntoView({ behavior: 'smooth' });
    }

    // ── Attach pointer events (works for mouse + touch) ──
    ['btn1', 'btn2'].forEach(id => {
      const btn = document.getElementById(id);

      btn.addEventListener('pointerdown', e => {
        e.preventDefault();
        btn.setPointerCapture(e.pointerId);
        startRecording(btn);
      });

      btn.addEventListener('pointerup', e => {
        e.preventDefault();
        if (activeBtn === btn) stopRecording();
      });

      btn.addEventListener('pointercancel', e => {
        if (activeBtn === btn) stopRecording();
      });
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
